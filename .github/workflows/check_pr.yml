name: Check PR
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    if: github.event_name != 'push'
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      # Run linting
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

      # Run unit tests and generate coverage report
      - name: Verify dependencies
        run: go mod verify
      - name: Build
        run: go build -v ./...
      - name: Run go vet
        run: go vet ./...
      - name: Build cbom-lens-ci
        run: go build -race -cover -covermode=atomic -o cbom-lens-ci ./cmd/cbom-lens
      - name: Run tests
        run: go test -v -race -vet=off -coverprofile=coverage.unit.out ./...
      - name: Convert cbom-lens-ci coverage
        run: go tool covdata textfmt -i=coverage/ -o coverage.integration.out

      # Package up PR context for downstream workflow_run
      - name: Prepare PR context artifact
        run: |
          cat > pr-context.json <<'JSON'
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "head_sha":  "${{ github.event.pull_request.head.sha }}",
            "head_repo": "${{ github.event.pull_request.head.repo.full_name }}",
            "head_branch": "${{ github.event.pull_request.head.ref }}",
            "base_ref": "${{ github.event.pull_request.base.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          JSON
          cat pr-context.json

      - name: Upload PR context
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-context
          path: pr-context.json
          retention-days: 1
          if-no-files-found: error

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.*.out
          if-no-files-found: error

      - name: Upload golangci-lint report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: golangci-lint-report
          path: golangci-lint-report.xml
          if-no-files-found: error

  check-windows:
    if: github.event_name != 'push'
    name: Check (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Verify dependencies
        run: go mod verify

      - name: Build with coverage
        run: go build -cover -covermode=atomic -o cbom-lens-ci.exe ./cmd/cbom-lens

      - name: Create coverage directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path coverage

      - name: Write test registry values
        shell: pwsh
        run: |
          New-Item -Path "HKCU:\Software\CBOMLensTest" -Force | Out-Null
          $pem = @"
          -----BEGIN CERTIFICATE-----
          MIICpDCCAYwCCQDU+pQ4pHgSpDANBgkqhkiG9w0BAQsFADAUMRIwEAYDVQQDDAls
          b2NhbGhvc3QwHhcNMjMwMTAxMDAwMDAwWhcNMjQwMTAxMDAwMDAwWjAUMRIwEAYD
          VQQDDAlsb2NhbGhvc3QwggEiMA0GCSqGSIb3DQEBAQUAA4IBDwAwggEKAoIBAQC7
          o4qne60TB3wolVWqoRxgHrPMHb3rj6Ge1IOJt3V0JVy19X5IKlP8q6r0eBMEEFMY
          -----END CERTIFICATE-----
          "@
          Set-ItemProperty -Path "HKCU:\Software\CBOMLensTest" -Name "PEMCert" -Value $pem.Trim() -Type String

      - name: Run registry scan
        shell: pwsh
        env:
          GOCOVERDIR: coverage
        run: |
          $config = @"
          version: 0
          service:
            mode: manual
          registry:
            enabled: true
            paths:
              - hive: HKCU
                key: 'Software\CBOMLensTest'
          "@
          $config | Out-File -FilePath cbom-lens-test.yaml -Encoding utf8
          .\cbom-lens-ci.exe run --config cbom-lens-test.yaml | Out-File -FilePath output.json
          $json = Get-Content output.json | ConvertFrom-Json
          if ($null -eq $json.bomFormat) { Write-Error "Output is not a valid CBOM"; exit 1 }

      - name: Cleanup test registry key
        if: always()
        shell: pwsh
        run: Remove-Item -Path "HKCU:\Software\CBOMLensTest" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-windows
          path: coverage/
